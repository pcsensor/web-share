services:
  chat-transfer:
    build: .
    container_name: chat-transfer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      CHAT_BIND: "0.0.0.0:8080"
      CHAT_SECRET_KEY: "${CHAT_SECRET_KEY:?set CHAT_SECRET_KEY}"
      CHAT_BOOTSTRAP_ADMIN_USER: "${CHAT_BOOTSTRAP_ADMIN_USER:-admin}"
      CHAT_BOOTSTRAP_ADMIN_PASSWORD: "${CHAT_BOOTSTRAP_ADMIN_PASSWORD:-change-me-now}"
      CHAT_REGISTRATION_OPEN: "${CHAT_REGISTRATION_OPEN:-true}"
      CHAT_INVITE_TTL_HOURS: "${CHAT_INVITE_TTL_HOURS:-24}"
      CHAT_DEVICE_TRUST_DAYS: "${CHAT_DEVICE_TRUST_DAYS:-60}"
      CHAT_TOTP_ISSUER: "${CHAT_TOTP_ISSUER:-Chat Transfer}"
      CHAT_DATA_DIR: "/app/data"
      CHAT_MAX_FILE_MB: "100"
      CHAT_RETENTION_SECS: "${CHAT_RETENTION_SECS:-10800}"
      CHAT_PURGE_INTERVAL_SECS: "${CHAT_PURGE_INTERVAL_SECS:-60}"
      CHAT_SESSION_TTL_SECS: "${CHAT_SESSION_TTL_SECS:-86400}"
      CHAT_PENDING_2FA_TTL_SECS: "${CHAT_PENDING_2FA_TTL_SECS:-300}"
      CHAT_SECURE_COOKIE: "${CHAT_SECURE_COOKIE:-false}"
      RUST_LOG: "chat_transfer=info,tower_http=info"
    volumes:
      - chat_data:/app/data

volumes:
  chat_data:
